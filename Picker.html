<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Preservation Survey Picker</title>
    <style>
      :root { --bg: #132018; --panel: #f7f4ec; --border: #c7bfae; --text: #1f2a22; --muted: #657064; --accent: #2f6f4e; --warn: #8a5a00; --danger: #9f1d20; --success: #1f6b3a; }
      * { box-sizing: border-box; }
      body { margin: 0; min-height: 100vh; display: grid; place-items: center; padding: 18px; font-family: Georgia, "Times New Roman", serif; color: var(--text); background: linear-gradient(180deg, #233426 0%, #111b14 100%); }
      button { font: inherit; }
      .dialog { width: min(100%, 640px); padding: 24px; border: 1px solid var(--border); border-radius: 8px; background: var(--panel); box-shadow: 0 22px 44px rgba(0,0,0,.32); }
      .eyebrow { color: var(--accent); font: 700 12px Arial, sans-serif; letter-spacing: .08em; text-transform: uppercase; }
      h1 { margin: 12px 0 8px; font-size: 28px; line-height: 1.1; }
      p { margin: 0; color: var(--muted); line-height: 1.5; }
      code { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
      .current { margin-top: 16px; padding: 14px; border: 1px solid var(--border); background: #fffdf8; }
      .current strong { display: block; margin-bottom: 6px; }
      .actions { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 18px; }
      .button { border: 0; border-radius: 6px; padding: 11px 16px; font-weight: 700; cursor: pointer; }
      .primary { color: #fff; background: var(--accent); }
      .secondary { color: var(--text); background: #e7e0d2; border: 1px solid var(--border); }
      .status { margin-top: 16px; padding: 12px 14px; border: 1px solid var(--border); background: #fffdf8; line-height: 1.5; }
      .warn { color: var(--warn); } .error { color: var(--danger); } .success { color: var(--success); }
    </style>
  </head>
  <body>
    <div class="dialog">
      <div class="eyebrow">Google Picker</div>
      <h1 id="title">Select Drive item</h1>
      <p id="description"></p>
      <div class="current"><strong id="current-label">Current selection</strong><span id="current-text">Nothing saved yet.</span></div>
      <div class="actions">
        <button class="button primary" id="launch-picker-button" type="button">Open Picker</button>
        <button class="button secondary" id="close-button" type="button">Close</button>
      </div>
      <div class="status" id="status-box">Preparing Google Picker...</div>
    </div>
    <script>
      const bootstrap = <?!= bootstrapJson ?>;
      let pickerApiLoaded = false;
      let pickerScriptRequested = false;
      let oauthToken = '';

      function initializePickerDialog() {
        bindEvents();
        renderMode();
        renderCurrent();
        if (!bootstrap.picker || !bootstrap.picker.configured) {
          setStatus('Google Picker credentials are not configured. Save your API key and Cloud project number from the sidebar first.', 'warn');
          return;
        }
        loadPickerApi(function() {
          google.script.run.withSuccessHandler(function(token) {
            oauthToken = token;
            openDrivePicker();
          }).withFailureHandler(handleFailure).getOAuthToken();
        });
      }

      function bindEvents() {
        document.getElementById('launch-picker-button').addEventListener('click', function() {
          if (!bootstrap.picker || !bootstrap.picker.configured) {
            setStatus('Picker credentials are missing. Configure them in the sidebar first.', 'warn');
            return;
          }
          loadPickerApi(function() {
            if (!oauthToken) {
              google.script.run.withSuccessHandler(function(token) {
                oauthToken = token;
                openDrivePicker();
              }).withFailureHandler(handleFailure).getOAuthToken();
              return;
            }
            openDrivePicker();
          });
        });
        document.getElementById('close-button').addEventListener('click', function() { google.script.host.close(); });
      }

      function renderMode() {
        const sheetMode = bootstrap.mode === 'sheet';
        document.getElementById('title').textContent = sheetMode ? 'Select the survey Sheet' : 'Select the photo folder';
        document.getElementById('description').innerHTML = sheetMode ?
          'Choose the Google Sheet that stores the structured field survey rows. The Sheet ID is saved in document properties.' :
          'Choose the Google Drive folder that contains numbered survey photos such as <code>Photo 12.jpg</code>.';
        document.getElementById('current-label').textContent = sheetMode ? 'Current survey Sheet' : 'Current photo folder';
        document.getElementById('launch-picker-button').textContent = sheetMode ? 'Open Drive Sheet Picker' : 'Open Drive Folder Picker';
      }

      function renderCurrent() {
        const record = bootstrap.mode === 'sheet' ? bootstrap.sheet : bootstrap.folder;
        document.getElementById('current-text').textContent = record && record.id ? record.name + ' (' + record.id + ')' : 'Nothing saved yet.';
      }

      function loadPickerApi(callback) {
        if (pickerApiLoaded) { callback(); return; }
        window.__presSurveyPickerReady = callback;
        if (pickerScriptRequested) { return; }
        pickerScriptRequested = true;
        window.onPresSurveyPickerLoaded = function() {
          gapi.load('picker', { callback: function() {
            pickerApiLoaded = true;
            if (typeof window.__presSurveyPickerReady === 'function') {
              const ready = window.__presSurveyPickerReady;
              window.__presSurveyPickerReady = null;
              ready();
            }
          }});
        };
        const script = document.createElement('script');
        script.src = 'https://apis.google.com/js/api.js?onload=onPresSurveyPickerLoaded';
        script.async = true;
        script.defer = true;
        script.onerror = function() { pickerScriptRequested = false; setStatus('Could not load the Google Picker API. Use manual ID entry in the sidebar.', 'error'); };
        document.head.appendChild(script);
      }

      function openDrivePicker() {
        const picker = bootstrap.picker || {};
        if (!oauthToken || !picker.developerKey || !picker.cloudProjectNumber) {
          setStatus('Picker credentials are incomplete. Save valid credentials in the sidebar and try again.', 'error');
          return;
        }
        setStatus('Opening Google Drive picker...', '');
        const builder = new google.picker.PickerBuilder()
            .setOAuthToken(oauthToken)
            .setDeveloperKey(picker.developerKey)
            .setAppId(picker.cloudProjectNumber)
            .setOrigin(google.script.host.origin)
            .setCallback(handlePickerData);
        if (bootstrap.mode === 'sheet') {
          builder.addView(new google.picker.DocsView(google.picker.ViewId.SPREADSHEETS));
        } else {
          builder.addView(new google.picker.DocsView(google.picker.ViewId.FOLDERS).setIncludeFolders(true).setSelectFolderEnabled(true));
        }
        builder.build().setVisible(true);
      }

      function handlePickerData(data) {
        const action = data[google.picker.Response.ACTION];
        if (action === google.picker.Action.CANCEL) { setStatus('Selection canceled.', 'warn'); return; }
        if (action !== google.picker.Action.PICKED) { return; }
        const item = data[google.picker.Response.DOCUMENTS][0];
        const id = item[google.picker.Document.ID];
        const name = item[google.picker.Document.NAME] || 'Selected item';
        setStatus('Saving selection...', '');
        google.script.run.withSuccessHandler(function() {
          setStatus('Selection saved: ' + name + '.', 'success');
          window.setTimeout(function() { google.script.host.close(); }, 900);
        }).withFailureHandler(handleFailure).handlePickerResponse(id, name, bootstrap.mode);
      }

      function setStatus(message, tone) {
        const box = document.getElementById('status-box');
        box.textContent = message;
        box.className = 'status' + (tone ? ' ' + tone : '');
      }
      function handleFailure(error) { setStatus(error && error.message ? error.message : String(error), 'error'); }
      window.addEventListener('load', initializePickerDialog);
    </script>
  </body>
</html>
